name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./... | tee test-output.log

      - name: Upload test results as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test-output.log
            coverage.out

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const testOutput = fs.readFileSync('test-output.log', 'utf8');
            
            // Извлекаем summary
            const lines = testOutput.split('\n');
            const summaryLine = lines.find(l => l.includes('ok') || l.includes('FAIL'));
            
            const comment = `## Test Results\n\n\`\`\`\n${summaryLine || 'Tests completed'}\n\`\`\``;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Upload coverage reports
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.out
          flags: unittests
          fail_ci_if_error: false

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/front

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx --yes nuxt typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
