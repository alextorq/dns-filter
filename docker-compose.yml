services:
  dns-filter:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: dns-filter
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "2112:2112/tcp"
      - "8080:8080/tcp"
    environment:
      - DNS_FILTER_DOH_UPSTREAM=https://cloudflare-dns.com/dns-query
      - DNS_FILTER_DOH_BOOTSTRAP_IPS=1.1.1.1,1.0.0.1
    restart: unless-stopped
    volumes:
      - dns-filter-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: frontend
    ports:
      - "8090:8090"
    restart: unless-stopped
    depends_on:
      - dns-filter
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  dns-filter-data:
  grafana-data:
