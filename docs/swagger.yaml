basePath: /
definitions:
  collect.SignalDescriptor:
    properties:
      code:
        type: string
      description:
        type: string
      label:
        type: string
    type: object
  create_domain.RequestBody:
    properties:
      domain:
        type: string
      source:
        type: string
    type: object
  db.BlockList:
    properties:
      active:
        type: boolean
      created_at:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      id:
        type: integer
      reasons:
        description: |-
          Reasons holds the auto-block signal codes (#95); read paths must
          Preload("Reasons") to populate it. See CreateDomainWithReasons.
        items:
          $ref: '#/definitions/db.BlockListReason'
        type: array
      source:
        type: string
      updated_at:
        type: string
      url:
        type: string
    type: object
  db.BlockListReason:
    properties:
      code:
        type: string
      id:
        type: integer
      match:
        type: string
    type: object
  db.BlockListSource:
    enum:
    - StevenBlack
    - EasyList
    - RuAdList
    - AdGuardRussian
    - HaGeZiMulti
    - User
    - SuggestedToBlock
    - AutoBlocked
    type: string
    x-enum-varnames:
    - SourceStevenBlack
    - SourceEasyList
    - SourceRuAdList
    - SourceAdGuardRussian
    - SourceHaGeZiMulti
    - SourceUser
    - SourceSuggestedToBlock
    - SourceAutoBlocked
  db.Client:
    properties:
      created_at:
        type: string
      deleted_at:
        $ref: '#/definitions/gorm.DeletedAt'
      filtered:
        type: boolean
      hostname:
        type: string
      id:
        type: integer
      ip:
        type: string
      last_seen:
        type: string
      mac:
        type: string
      name:
        type: string
      token:
        type: string
      updated_at:
        type: string
      vendor:
        type: string
    type: object
  db.Source:
    properties:
      active:
        type: boolean
      created_at:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      id:
        type: integer
      name:
        $ref: '#/definitions/db.BlockListSource'
      updated_at:
        type: string
    type: object
  db.SuggestBlock:
    properties:
      active:
        type: boolean
      domain:
        type: string
      id:
        type: integer
      reasons:
        items:
          $ref: '#/definitions/db.SuggestBlockReason'
        type: array
      score:
        type: integer
    type: object
  db.SuggestBlockReason:
    properties:
      code:
        type: string
      id:
        type: integer
      match:
        type: string
    type: object
  discovery.Device:
    properties:
      already_registered:
        type: boolean
      hostname:
        type: string
      ip:
        type: string
      mac:
        type: string
      source:
        type: string
      vendor:
        type: string
    type: object
  domain_inspect.CheckResult:
    properties:
      details:
        additionalProperties: {}
        type: object
      duration_ms:
        type: integer
      error:
        type: string
      name:
        type: string
      status:
        $ref: '#/definitions/domain_inspect.CheckStatus'
      verdict:
        $ref: '#/definitions/domain_inspect.Verdict'
    type: object
  domain_inspect.CheckStatus:
    enum:
    - ok
    - error
    - skipped
    - timeout
    - rate_limited
    type: string
    x-enum-varnames:
    - StatusOK
    - StatusError
    - StatusSkipped
    - StatusTimeout
    - StatusRateLimited
  domain_inspect.InspectResult:
    properties:
      checks:
        items:
          $ref: '#/definitions/domain_inspect.CheckResult'
        type: array
      domain:
        type: string
      summary:
        $ref: '#/definitions/domain_inspect.Summary'
    type: object
  domain_inspect.Summary:
    properties:
      score:
        type: integer
      verdict:
        $ref: '#/definitions/domain_inspect.Verdict'
    type: object
  domain_inspect.Verdict:
    enum:
    - unknown
    - clean
    - suspicious
    - malicious
    type: string
    x-enum-varnames:
    - VerdictUnknown
    - VerdictClean
    - VerdictSuspicious
    - VerdictMalicious
  github_com_alextorq_dns-filter_auth_web.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  github_com_alextorq_dns-filter_auth_web.StatusResponse:
    properties:
      status:
        type: string
    type: object
  github_com_alextorq_dns-filter_blocked-domain_web.ErrorResponse:
    properties:
      message:
        type: string
    type: object
  github_com_alextorq_dns-filter_blocked-domain_web.MessageResponse:
    properties:
      message:
        type: string
    type: object
  github_com_alextorq_dns-filter_clients_web.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  github_com_alextorq_dns-filter_clients_web.StatusResponse:
    properties:
      status:
        type: string
    type: object
  github_com_alextorq_dns-filter_domain-inspect_web.ErrorResponse:
    properties:
      message:
        type: string
    type: object
  github_com_alextorq_dns-filter_logger_web.MessageResponse:
    properties:
      message:
        type: string
    type: object
  github_com_alextorq_dns-filter_settings_web.MessageResponse:
    properties:
      message:
        type: string
    type: object
  github_com_alextorq_dns-filter_source_web.ErrorResponse:
    properties:
      message:
        type: string
    type: object
  github_com_alextorq_dns-filter_suggest-to-block_web.ErrorResponse:
    properties:
      message:
        type: string
    type: object
  github_com_alextorq_dns-filter_suggest-to-block_web.MessageResponse:
    properties:
      message:
        type: string
    type: object
  github_com_alextorq_dns-filter_traffic_web.ErrorResponse:
    properties:
      message:
        type: string
    type: object
  gorm.DeletedAt:
    properties:
      time:
        type: string
      valid:
        description: Valid is true if Time is not NULL
        type: boolean
    type: object
  settings.Effective:
    properties:
      default:
        type: string
      enum:
        items:
          type: string
        type: array
      key:
        type: string
      overridden:
        type: boolean
      type:
        type: string
      value:
        type: string
    type: object
  update_dns_record.UpdateBlockList:
    properties:
      active:
        type: boolean
      id:
        type: integer
    required:
    - id
    type: object
  web.AddToBlockRequest:
    properties:
      domain:
        type: string
      id:
        type: integer
    type: object
  web.BadRequestResponse:
    properties:
      message:
        type: string
    type: object
  web.ChangeFilterRequest:
    properties:
      filtered:
        type: boolean
      id:
        type: integer
    type: object
  web.ChangeSourceActiveRequest:
    properties:
      active:
        type: boolean
      id:
        type: integer
    type: object
  web.ChangeSourceActiveResponse:
    properties:
      message:
        type: string
      record:
        $ref: '#/definitions/db.Source'
    type: object
  web.ChangeSuggestStatusRequest:
    properties:
      active:
        type: boolean
      id:
        type: integer
    type: object
  web.ClearCacheResponse:
    properties:
      cleared:
        description: |-
          Cleared is the number of entries removed by this call. Zero is a
          legitimate outcome (operator flushed an already-cold cache) and the
          frontend differentiates it from an error in the toast text.
        type: integer
    type: object
  web.ClientResponse:
    properties:
      client:
        $ref: '#/definitions/db.Client'
    type: object
  web.CreateClientRequest:
    properties:
      filtered:
        type: boolean
      hostname:
        type: string
      ip:
        type: string
      mac:
        type: string
      name:
        type: string
      token:
        type: string
      vendor:
        type: string
    type: object
  web.DeleteClientRequest:
    properties:
      id:
        type: integer
    type: object
  web.DeviceDTO:
    properties:
      allowed_count:
        type: integer
      blocked_count:
        type: integer
      client_kind:
        type: string
      client_value:
        type: string
      current_ip:
        type: string
      hostname:
        type: string
      last_seen:
        type: string
      vendor:
        type: string
    type: object
  web.DeviceDomainsResponse:
    properties:
      list:
        items:
          $ref: '#/definitions/web.DomainCountDTO'
        type: array
      total:
        type: integer
    type: object
  web.DevicesResponse:
    properties:
      devices:
        items:
          $ref: '#/definitions/web.DeviceDTO'
        type: array
    type: object
  web.DiscoverResponse:
    properties:
      devices:
        items:
          $ref: '#/definitions/discovery.Device'
        type: array
      errors:
        items:
          type: string
        type: array
      total:
        type: integer
    type: object
  web.DomainCountDTO:
    properties:
      count:
        type: integer
      domain:
        type: string
    type: object
  web.FilterStatusResponse:
    properties:
      paused_until:
        description: |-
          PausedUntil is the unix-second deadline of an active pause, or 0 if no
          pause is active. The frontend uses this absolute value to drive its
          countdown without depending on server-supplied "seconds left".
        type: integer
      status:
        type: boolean
    type: object
  web.GetAllDnsRecordsRequest:
    properties:
      filter:
        type: string
      limit:
        type: integer
      offset:
        type: integer
      source:
        type: string
    type: object
  web.GetAllDnsRecordsResponse:
    properties:
      list:
        items:
          $ref: '#/definitions/db.BlockList'
        type: array
      total:
        type: integer
    type: object
  web.GetAllSourcesResponse:
    properties:
      list:
        items:
          $ref: '#/definitions/db.Source'
        type: array
      total:
        type: integer
    type: object
  web.GetAllSuggestBlocksRequest:
    properties:
      active:
        type: boolean
      codes:
        items:
          type: string
        type: array
      filter:
        type: string
      limit:
        type: integer
      offset:
        type: integer
    type: object
  web.GetAllSuggestBlocksResponse:
    properties:
      list:
        items:
          $ref: '#/definitions/db.SuggestBlock'
        type: array
      total:
        type: integer
    type: object
  web.GetAmountResponse:
    properties:
      amount:
        type: integer
    type: object
  web.GetSignalCodesResponse:
    properties:
      list:
        items:
          $ref: '#/definitions/collect.SignalDescriptor'
        type: array
    type: object
  web.ListClientsResponse:
    properties:
      list:
        items:
          $ref: '#/definitions/db.Client'
        type: array
      total:
        type: integer
    type: object
  web.LogLevelResponse:
    properties:
      level:
        type: string
    type: object
  web.LoginRequest:
    properties:
      login:
        type: string
      password:
        type: string
    required:
    - login
    - password
    type: object
  web.PauseFilterRequest:
    properties:
      minutes:
        type: integer
    type: object
  web.TopDomainsResponse:
    properties:
      list:
        items:
          $ref: '#/definitions/web.DomainCountDTO'
        type: array
    type: object
  web.UpdateClientRequest:
    properties:
      hostname:
        type: string
      id:
        type: integer
      name:
        type: string
      vendor:
        type: string
    type: object
  web.UpdateConfigData:
    properties:
      logLevel:
        type: string
    type: object
  web.UpdateDnsRecordResponse:
    properties:
      message:
        type: string
      record:
        $ref: '#/definitions/db.BlockList'
    type: object
  web.UpdateSettingRequest:
    properties:
      value:
        type: string
    type: object
  web.UserResponse:
    properties:
      id:
        type: integer
      login:
        type: string
    type: object
info:
  contact: {}
  description: 'HTTP API for the DNS filter: managing block lists, sources, clients,
    suggestions and runtime config.'
  title: DNS Filter API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/web.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_auth_web.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_auth_web.ErrorResponse'
      summary: Login
      tags:
      - auth
  /api/auth/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_auth_web.StatusResponse'
      summary: Logout
      tags:
      - auth
  /api/auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_auth_web.ErrorResponse'
      summary: Current user
      tags:
      - auth
  /api/clients:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.ListClientsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_clients_web.ErrorResponse'
      summary: List clients
      tags:
      - clients
  /api/clients/change-filter:
    post:
      consumes:
      - application/json
      parameters:
      - description: Target state
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/web.ChangeFilterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.ClientResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.BadRequestResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_clients_web.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_clients_web.ErrorResponse'
      summary: Change client filter flag
      tags:
      - clients
  /api/clients/create:
    post:
      consumes:
      - application/json
      parameters:
      - description: Client to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/web.CreateClientRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.ClientResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.BadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_clients_web.ErrorResponse'
      summary: Create client
      tags:
      - clients
  /api/clients/delete:
    post:
      consumes:
      - application/json
      parameters:
      - description: Client id
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/web.DeleteClientRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_clients_web.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.BadRequestResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_clients_web.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_clients_web.ErrorResponse'
      summary: Delete client
      tags:
      - clients
  /api/clients/discover:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.DiscoverResponse'
        "409":
          description: discovery is not supported in the current deployment mode
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_clients_web.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_clients_web.ErrorResponse'
      summary: Scan LAN for devices
      tags:
      - clients
  /api/clients/update:
    post:
      consumes:
      - application/json
      parameters:
      - description: Fields to patch
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/web.UpdateClientRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.ClientResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.BadRequestResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_clients_web.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_clients_web.ErrorResponse'
      summary: Update client metadata
      tags:
      - clients
  /api/config/db/download:
    get:
      produces:
      - application/octet-stream
      responses:
        "200":
          description: filter.sqlite
          schema:
            type: file
      summary: Download database file
      tags:
      - config
  /api/config/logger/change-level:
    post:
      consumes:
      - application/json
      parameters:
      - description: Target log level
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/web.UpdateConfigData'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_logger_web.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_logger_web.MessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_logger_web.MessageResponse'
      summary: Change log level
      tags:
      - config
  /api/config/logger/get-level:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.LogLevelResponse'
      summary: Get log level
      tags:
      - config
  /api/dns-cache/clear:
    post:
      description: Drops every entry from the in-memory DNS response cache. The next
        query for each name will be resolved upstream.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.ClearCacheResponse'
      summary: Clear DNS response cache
      tags:
      - dns-cache
  /api/dns-records:
    post:
      consumes:
      - application/json
      parameters:
      - description: Pagination and filtering
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/web.GetAllDnsRecordsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.GetAllDnsRecordsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_blocked-domain_web.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_blocked-domain_web.ErrorResponse'
      summary: List blocked DNS records
      tags:
      - dns-records
  /api/dns-records/create:
    post:
      consumes:
      - application/json
      parameters:
      - description: Domain to block
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/create_domain.RequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_blocked-domain_web.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_blocked-domain_web.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_blocked-domain_web.ErrorResponse'
      summary: Create a blocked DNS record
      tags:
      - dns-records
  /api/dns-records/update:
    post:
      consumes:
      - application/json
      parameters:
      - description: Record id and target active state
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/update_dns_record.UpdateBlockList'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.UpdateDnsRecordResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_blocked-domain_web.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_blocked-domain_web.ErrorResponse'
      summary: Update a blocked DNS record
      tags:
      - dns-records
  /api/domain/inspect:
    get:
      parameters:
      - description: Domain to inspect (e.g. example.com)
        in: query
        name: domain
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain_inspect.InspectResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_domain-inspect_web.ErrorResponse'
      summary: Inspect a domain with reputation/diagnostic checks
      tags:
      - domain-inspect
  /api/events/block/amount:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.GetAmountResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_alextorq_dns-filter_blocked-domain_web.ErrorResponse'
      summary: Total block events
      tags:
      - events
  /api/filter/change-status:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.FilterStatusResponse'
      summary: Toggle the DNS filter
      tags:
      - filter
  /api/filter/pause:
    post:
      consumes:
      - application/json
      parameters:
      - description: duration in minutes
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.PauseFilterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.FilterStatusResponse'
        "400":
          description: Bad Request
          schema:
