apiVersion: 1

# Load every JSON in /var/lib/grafana/dashboards as a dashboard. Files are
# the source of truth — UI edits are overwritten on the next sync interval.
providers:
  - name: dns-filter
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
