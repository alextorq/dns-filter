server {
    listen 8090;

    # Статика фронтенда
    root /usr/share/nginx/html;
    index index.html;

    # API → backend. dns-filter runs in host networking (see docker-compose.yml
    # for the rationale), so we can't reach it via the Docker DNS name; the
    # `extra_hosts: host-gateway` directive on the frontend service makes
    # host.docker.internal resolve to the host's gateway IP on Linux.
    location /api/ {
        proxy_pass http://host.docker.internal:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # SPA роутинг (Vue/React/Angular)
    location / {
        try_files $uri /index.html;
    }
}
